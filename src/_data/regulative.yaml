titel: "regulative BeHANDlung ist …"
spalte1: |
  ein gutes Werkzeug/eine feine Stimmgabel um wieder anzukommen … ,

  in meiner ureigenen Schwingung, meinem Ton … .

  Damit wir alle wieder, in diesem großen Orchester,
spalte2: |
  zur rechten Zeit, am richtigen Platz,

  mit gut gestimmtem Instrument, den eigenen Ton spielen.

  Das IST Wohlklang.
