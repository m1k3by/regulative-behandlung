  - id: "akk-indikationen"
    titel: "Indikationen"
    offen: true
    inhalt: |
      Schwangerschaftsbegleitung, traumatische Geburtserlebnisse und Regulationsstörungen daraus bei Kindern und Erwachsenen, Schiefhals, Gedeihstörung, Verdauungsprobleme, Schreikind, verzögertes Krabbeln, motorische Störungen, Konzentrationsprobleme, Rückenschmerzen, Kopfschmerzen, Menstruationsprobleme, Gelenksschmerzen, Spannungszustände nach Unfällen/Operationen/sonst. „Eingriffen", Beckenschiefstand, Beinlängendifferenzen, Hüft-, Knie- und Fußprobleme, Wirbel- und Gelenksfehlstellungen, Kieferfehlstellungen, Zähneknirschen, craniomandibuläre Dysfunktion, Spannungskopfschmerzen, Halswirbelsäulen- und Schulter / Arm – thematik, Narbenstörfelder, Schock-folgen und Trauma-abspaltungen, …

