  - id: "akk-ablauf"
    titel: "BeHANDlungsablauf"
    offen: false
    inhalt: |
      › Gespräch
      › Anamnese

      Numeroskopbestimmung – das Konstitutionsmittel der Bach-Blüten, meine (Auf-)Gaben – die Partitur meines Seelenliedes

      › regulative BeHANDlung …
      … erfolgt in der Regel bequem gekleidet auf der Liege

      **regulative BeHANDlung hilft uns …**
      … sanft und ohne Manipulation, in Geborgenheit, mit Respekt und Achtsamkeit,
      zurück zu unserem Ursprung,
      unserer ureigenen Schwingung,
      unserem Ur-Ton …

      Jetzt … kann Heilung stattfinden…
      Jeder Mensch weiß wie es „gedacht ist"
      und kann dahin zurückfinden … .
      Seinen ureigenen „Plan" wieder ent-decken …

      Ich gebe Hilfestellung zur Selbsthilfe.
      Aktivierung der Selbst-heilungs-kräfte, des eigenen, inneren Arztes

      › **Nachruhe – ist sehr WICHTIG!!**
      Das ist die Heilungs (ganz-SEIN) – und Integrations (Einordnung / Verschmelzung) – Zeit

      › Besprechung eventueller „Hausaufgaben"

      Nach der Be HANDlung ist ein Salzbad (in reinem Atlantikmeersalz) ratsam (zur Entsäuerung, Entgiftung, Energie-und Mineralienzuführung, Harmonisierung)

      … und … Zeit für sich selbst.

