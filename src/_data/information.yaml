  - id: "akk-weitere"
    titel: "weitere Informationen"
    offen: false
    inhalt: |
      Viele unserer Blockaden und Energieflußstörungen,
      die Ursache für unsere verschiedenen Symptome sein können,
      werden schon in frühester Kindheit angelegt/verursacht.
      Die Symptomatik wiederholt sich wieder und wieder,
      solange, bis wir „uns – wieder – erkennen" und -dadurch- in die Heilung gehen.

      Und … die Kindheit beginnt nicht mit der Geburt, schon mit der Zeugung,
      … noch weiter zurück: die beiden Ur-Zellen unseres Mensch-SEINS
      sind schon irdisch (erdgebunden), seit unsere Eltern im Bauch ihrer Mamas waren … .

      In körperlicher Ausdrucksform liegt sehr oft eine Blockade/Fixierung
      des Atlas – Kopf – Gelenks (Schädelbasis / 1. Halswirbel) oder
      der Kreuz – Darmbein – Gelenke (untere Basis der Wirbelsäule/Becken) vor.
      Diese Verschiebung wirkt sich auf jede Körperregion aus
      und kann Beschwerden verursachen.

      Ich „arbeite" mit dem Menschen und nicht an ihm.
      Es geht um das eigene, innere „wieder – erkennen".

      „The Evolvement of the Original Concept" – „die ursprünglichen Anlagen zur Entfaltung bringen"
      *Dr. Arthur Lincoln Pauls, Begründer der Ortho-Bionomy®*

      Aus diesem Grund kann eigentlich (ursprünglich, in Wirklichkeit)
      jedes Symptom/jede Energieflußstörung regulativ (ordnend) beHANDelt werden.
      Alles ist in uns vorhanden und möglich … wir haben ES nur eben vergessen,
      verdrängt oder abgespaltet. Mal sehen, wie weit wir wieder zu uns finden …
