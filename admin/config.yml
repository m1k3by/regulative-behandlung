# ─────────────────────────────────────────────
# Decap CMS – Konfiguration
# ─────────────────────────────────────────────
backend:
  name: github
  repo: m1k3by/regulative-behandlung
  branch: master
  # WICHTIG: Nach dem Deployment auf Vercel hier die eigene URL eintragen
  # z.B. https://regulative-behandlung.vercel.app
  base_url: https://DEINE-VERCEL-URL.vercel.app
  auth_endpoint: api/auth

# Bilder werden in img/ gespeichert
media_folder: "img"
public_folder: "/img"

# Sprache der CMS-Oberfläche
locale: de

# ─────────────────────────────────────────────
# COLLECTIONS – eine pro YAML-Datei
# ─────────────────────────────────────────────
collections:

  # ── Aktuelles – Slides ──────────────────────
  - name: aktuelles
    label: "Aktuelles (Slides)"
    files:
      - name: slides
        label: Slides
        file: src/_data/aktuelles.yaml
        fields:
          - name: slides
            label: Slides
            widget: list
            fields:
              - { name: bild,       label: Bild,             widget: image }
              - { name: bild_alt,   label: Bildbeschreibung, widget: string }
              - { name: kategorie,  label: Kategorie,        widget: string,   required: false }
              - { name: titel,      label: Titel,            widget: string,   required: false }
              - { name: untertitel, label: Untertitel,       widget: string,   required: false }
              - { name: termin,     label: Termin,           widget: string,   required: false }
              - { name: ort,        label: Ort,              widget: string,   required: false }
              - { name: beschreibung, label: Beschreibung,   widget: markdown, required: false }
              - { name: kosten,     label: Kosten,           widget: string,   required: false }

  # ── Information – Akkordeon ─────────────────
  - name: information
    label: "Information (Akkordeon)"
    files:
      - name: inhalte
        label: Akkordeon-Abschnitte
        file: src/_data/information.yaml
        fields:
          - name: items
            label: Abschnitte
            widget: list
            fields:
              - { name: id,    label: ID (nicht ändern!), widget: string }
              - { name: titel, label: Titel,              widget: string }
              - { name: offen, label: Standardmäßig offen, widget: boolean, default: false }
              - { name: inhalt, label: Inhalt (Markdown), widget: markdown, required: false }
              - name: selbstzahler
                label: "Kosten – Selbstzahler"
                widget: list
                required: false
                fields:
                  - { name: leistung, label: Leistung, widget: string }
                  - { name: preis,    label: Preis,    widget: string }
              - name: privat
                label: "Kosten – Privatpatienten"
                widget: list
                required: false
                fields:
                  - { name: leistung, label: Leistung, widget: string }
                  - { name: preis,    label: Preis,    widget: string }
              - { name: kosten_hinweis, label: Kostenhinweis, widget: text,   required: false }
              - name: werkzeuge
                label: Werkzeuge-Liste
                widget: list
                required: false
                field: { name: werkzeug, label: Werkzeug, widget: string }

  # ── Salz ────────────────────────────────────
  - name: salz
    label: Salz
    files:
      - name: salz
        label: Salz-Sektion
        file: src/_data/salz.yaml
        fields:
          - name: karten
            label: Bild-Karten
            widget: list
            fields:
              - { name: bild,        label: Bild,             widget: image }
              - { name: bild_alt,    label: Bildbeschreibung, widget: string }
              - { name: aria_label,  label: ARIA Label,       widget: string }
              - { name: zitat_text,  label: Zitat,            widget: text }
              - { name: zitat_autor, label: Zitat-Autor,      widget: string, required: false }
          - name: pdfs
            label: PDF-Dateien
            widget: list
            fields:
              - { name: datei,       label: Datei,      widget: file }
              - { name: bezeichnung, label: Bezeichnung, widget: string }
              - { name: aria,        label: ARIA Label,  widget: string }

  # ── Kontakt ─────────────────────────────────
  - name: kontakt
    label: Kontakt
    files:
      - name: kontaktdaten
        label: Kontaktdaten
        file: src/_data/kontakt.yaml
        fields:
          - { name: name,             label: Name,                  widget: string }
          - { name: zusatz,           label: Zusatz,                widget: string }
          - { name: strasse,          label: Straße,                widget: string }
          - { name: ort,              label: Ort (PLZ + Stadt),     widget: string }
          - { name: telefon_anzeige,  label: "Telefon (Anzeige)",   widget: string }
          - { name: telefon_link,     label: "Telefon (tel:-Link)", widget: string }
          - { name: email,            label: "E-Mail",              widget: string }
          - { name: maps_embed,       label: "Google Maps Embed-URL", widget: string }
          - { name: maps_link,        label: "Google Maps Link",    widget: string }

  # ── Regulative BeHANDlung ist … ─────────────
  - name: regulative
    label: "Regulative BeHANDlung ist …"
    files:
      - name: inhalt
        label: Inhalt
        file: src/_data/regulative.yaml
        fields:
          - { name: parallax_bild,  label: Hintergrundbild,  widget: image }
          - { name: titel,          label: Titel,            widget: string }
          - { name: spalte1,        label: Linke Spalte,     widget: markdown }
          - { name: spalte2,        label: Rechte Spalte,    widget: markdown }

  # ── Zitate ──────────────────────────────────
  - name: zitate
    label: Zitate
    files:
      - name: zitate
        label: Zitate
        file: src/_data/zitate.yaml
        fields:
          - name: zitate
            label: Zitate
            widget: list
            fields:
              - { name: hintergrund, label: Hintergrundbild,              widget: image }
              - { name: text,        label: Zitat-Text,                   widget: text }
              - { name: autor,       label: Autor,                        widget: string }
              - { name: stil,        label: "Stil (ortho oder capra)",    widget: string }

  # ── Website-Einstellungen ───────────────────
  - name: site
    label: "Website-Einstellungen"
    files:
      - name: einstellungen
        label: Einstellungen
        file: src/_data/site.yaml
        fields:
          - { name: titel,                label: Seitentitel,          widget: string }
          - { name: meta_description,     label: Meta-Beschreibung,    widget: text }
          - { name: logo,                 label: Logo,                 widget: image }
          - { name: logo_alt,             label: Logo-Beschreibung,    widget: string }
          - { name: hero_foto,            label: Hero-Bild,            widget: image }
          - { name: hero_foto_alt,        label: "Hero-Bild Beschreibung", widget: string }
          - { name: hero_logo,            label: Hero-Logo,            widget: image }
          - { name: hero_logo_alt,        label: "Hero-Logo Beschreibung", widget: string }
          - { name: hero_overlay_titel,   label: Overlay-Titel,        widget: string }
          - { name: hero_overlay_text,    label: Overlay-Text,         widget: markdown }
          - { name: hero_overlay_schluss, label: Overlay-Schlusstext,  widget: string }
          - { name: footer_copyright,     label: Copyright-Text,       widget: string }
